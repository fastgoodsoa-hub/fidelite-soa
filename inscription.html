    <label>Nom</label><input type="text" id="nom" autocomplete="family-name">
    <label>Téléphone</label><input type="tel" id="tel" autocomplete="tel" placeholder="06 12 34 56 78">
    <label>Email (facultatif)</label><input type="email" id="email" autocomplete="email">
    <div class="cgu"><input type="checkbox" id="cgu">
      <span>J'accepte que SOA conserve ces informations dans le seul but de gérer le programme de fidélité. Je peux demander leur suppression à tout moment.</span></div>
    <button id="go" disabled>Créer ma carte</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
var BACKEND="https://script.google.com/macros/s/AKfycbxlsLXfynh2ttLKA0Mg_SvEGfyofH-Ri42I4RCgpvFo3HQ8TrLbtOdwvNjtohHmS0Ep9Q/exec";
function api(action,p){var u=BACKEND+"?action="+encodeURIComponent(action);for(var k in p){if(p[k]!=null)u+="&"+k+"="+encodeURIComponent(p[k]);}return fetch(u).then(function(r){return r.json();});}
var cgu=document.getElementById('cgu'),go=document.getElementById('go');
cgu.onchange=function(){go.disabled=!cgu.checked;};
go.onclick=function(){
  var prenom=document.getElementById('prenom').value.trim();
  var tel=document.getElementById('tel').value.trim();
  var msg=document.getElementById('msg');
  if(!prenom||!tel){msg.className='msg err';msg.textContent='Prénom et téléphone obligatoires.';return;}
  go.disabled=true;msg.className='msg';msg.textContent='Création…';
  api('register',{prenom:prenom,nom:document.getElementById('nom').value.trim(),tel:tel,email:document.getElementById('email').value.trim()})
  .then(function(d){
    if(!d.ok){msg.className='msg err';msg.textContent=d.error||'Erreur';go.disabled=false;return;}
    msg.className='msg ok';msg.textContent=d.existing?'Tu as déjà une carte, on te la rouvre…':'Carte créée ! Redirection…';
    setTimeout(function(){location.href='carte.html?id='+encodeURIComponent(d.id);},900);
  }).catch(function(){msg.className='msg err';msg.textContent='Connexion impossible.';go.disabled=false;});
};
</script></body></html>
